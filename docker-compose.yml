services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: rentwise
      POSTGRES_PASSWORD: rentwise
      POSTGRES_DB: rentwise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://rentwise:rentwise@db:5432/rentwise
      - JWT_SECRET=super-long-random-secret
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - api

volumes:
  pgdata: